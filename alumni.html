<!DOCTYPE html>
<html>
<head>
<title>Data Alumni</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<div class="flex min-h-screen">

<div class="w-64 bg-white border-r">

<div class="p-6 border-b">

<h1 class="text-xl font-bold text-blue-600">
AlumniTracker
</h1>

<p class="text-sm text-gray-400">
Admin Dashboard
</p>

</div>

<nav class="p-4 space-y-2">

<a href="index.html"
class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
Dashboard
</a>

<a href="alumni.html"
class="block px-4 py-2 rounded-lg bg-blue-50 text-blue-600 font-medium">
Data Alumni
</a>

</nav>

</div>

<div class="flex-1">

<div class="bg-white border-b px-8 py-4">

<h2 class="text-lg font-semibold">
Manajemen Alumni
</h2>

</div>

<div class="p-8">

<div class="bg-white p-6 rounded-xl shadow-sm border mb-8">

<h3 class="font-semibold mb-4">
Tambah Alumni
</h3>

<div class="grid grid-cols-4 gap-4">

<input id="nama" placeholder="Nama" class="border rounded-lg px-3 py-2">
<input id="jurusan" placeholder="Jurusan" class="border rounded-lg px-3 py-2">
<input id="universitas" placeholder="Universitas" class="border rounded-lg px-3 py-2">
<input id="kota" placeholder="Kota" class="border rounded-lg px-3 py-2">

</div>

<button onclick="addAlumni()"
class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">

Tambah Alumni

</button>

</div>

<input
id="search"
placeholder="Cari alumni..."
class="border rounded-lg px-3 py-2 mb-4 w-64"
onkeyup="searchAlumni()"
/>

<div class="bg-white rounded-xl shadow-sm border overflow-hidden">

<table class="w-full text-sm">

<thead class="bg-gray-50 border-b">

<tr class="text-left text-gray-500">

<th class="p-4">Nama</th>
<th class="p-4">Jurusan</th>
<th class="p-4">Status</th>
<th class="p-4">Aksi</th>

</tr>

</thead>

<tbody id="list" class="divide-y"></tbody>

</table>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
