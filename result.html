<!DOCTYPE html>
<html>
<head>
<title>Tracking Result</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<div class="flex min-h-screen">

<div class="w-64 bg-white border-r">

<div class="p-6 border-b">

<h1 class="text-xl font-bold text-blue-600">
AlumniTracker
</h1>

<p class="text-sm text-gray-400">
Admin Dashboard
</p>

</div>

<nav class="p-4 space-y-2">

<a href="index.html"
class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
Dashboard
</a>

<a href="alumni.html"
class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
Data Alumni
</a>

</nav>

</div>

<div class="flex-1">

<div class="bg-white border-b px-8 py-4">

<h2 class="text-lg font-semibold">
Hasil Pelacakan Alumni
</h2>

</div>

<div class="p-8">

<div class="bg-white rounded-xl shadow-sm border overflow-hidden">

<table class="w-full text-sm">

<thead class="bg-gray-50 border-b">

<tr class="text-left text-gray-500">

<th class="p-4">Sumber</th>
<th class="p-4">Jabatan</th>
<th class="p-4">Instansi</th>
<th class="p-4">Confidence</th>

</tr>

</thead>

<tbody id="result" class="divide-y"></tbody>

</table>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
